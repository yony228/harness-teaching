name: Daily Knowledge Collection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: project/ai-knowledge-base-v2

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run knowledge collection pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose
        env:
          LLM_PROVIDER: "${{ vars.LLM_PROVIDER }}"
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          QWEN_API_KEY: "${{ secrets.QWEN_API_KEY }}"
          OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"

      - name: Validate article JSON
        run: python hooks/validate_json.py knowledge/raw/*.json

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/raw/*.json

      - name: Commit and push new articles
        run: |
          NEW_COUNT=$(git status --porcelain | grep "knowledge/raw/" | wc -l | tr -d " ") || true
          TODAY=$(date -u +"%Y%m%d")

          # Exit early if no new articles
          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "No new articles to commit."
            exit 0
          fi

          git add project/ai-knowledge-base-v2/knowledge/
          git -c user.name="github-actions" \
              -c user.email="github-actions@github.com" \
              commit -m "feat: add $NEW_COUNT article(s) - $TODAY"
          git push
